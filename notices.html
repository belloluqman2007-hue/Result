<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notices | Ameenullah School</title>
  <!-- NEW FILE (pack 26 - owner: "move ... notices ... to the sidebar"):
       the Notice Board moved here from the dashboard, UNCHANGED - same
       form ids, same dashboard.js logic (post / edit / delete
       announcements & dated events, choose the audience). -->
  <link rel="stylesheet" href="css/modern-ui.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f5021">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    /* Staff page chrome - identical pattern to chat.html / scores.html */
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Segoe UI', Arial, sans-serif; background:#eef3ef; color:#1f2d26; }
    .nt-top{
      background:linear-gradient(120deg,#14291c,#1d4a30 55%,#276b43); color:#fff;
      display:flex; align-items:center; gap:12px; padding:12px 16px;
      position:sticky; top:0; z-index:20; box-shadow:0 2px 10px rgba(0,0,0,.18);
    }
    .nt-top img{ width:34px; height:34px; border-radius:8px; background:#fff; }
    .nt-top b{ font-size:16px; }
    .nt-top small{ display:block; font-size:11px; opacity:.85; }
    .nt-back{
      margin-left:auto; background:rgba(255,255,255,.14); color:#fff; border:none;
      padding:8px 14px; border-radius:10px; font-weight:700; cursor:pointer; text-decoration:none;
      font-size:13px;
    }
    .nt-wrap{ max-width:860px; margin:0 auto; padding:16px 14px 60px; }
    .nt-wrap .ams-panel{ width:100%; }
  </style>
</head>
<body>
  <header class="nt-top">
    <img src="images/LOGO.JPG" alt="Logo">
    <div><b>&#128226; Notices</b><small>Announcements &amp; events for staff, students, parents and the website</small></div>
    <a class="nt-back" href="teacher-dashboard.html">&larr; Dashboard</a>
  </header>

  <main class="nt-wrap">
    <!-- EXISTING notice board - moved from the dashboard in pack 26,
         UNCHANGED (same ids + handlers; dashboard.js drives it). -->
    <div class="ams-panel ams-col-12">
      <div class="ams-panel-head">
        <h3 class="ams-panel-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 13z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
          Notice Board
        </h3>
      </div>
      <form class="ams-form-row" id="amsAnnouncementForm">
        <input type="text" id="amsAnnTitle" placeholder="Announcement title" required>
        <textarea id="amsAnnBody" placeholder="Write the announcement..."></textarea>
        <!-- audience + kind controls (pack 22) - unchanged -->
        <div class="ams-ann-controls">
          <label>Who sees it:
            <select id="amsAnnAudience">
              <option value="general">Everyone (teachers, students &amp; parents + website)</option>
              <option value="teacher">Teachers only</option>
              <option value="student">Students only</option>
              <option value="parent">Parents only</option>
            </select>
          </label>
          <label>Type:
            <select id="amsAnnKind">
              <option value="announcement">Announcement</option>
              <option value="event">Event (needs a date)</option>
            </select>
          </label>
          <label id="amsAnnDateWrap" style="display:none;">Event date:
            <input type="date" id="amsAnnDate">
          </label>
        </div>
        <button type="submit" class="m-btn-sm" id="amsAnnSubmitBtn">Post Announcement</button>
        <button type="button" class="m-btn-sm" id="amsAnnCancelEdit" style="display:none; background:#8C3B2E; border-color:#8C3B2E; color:#fff;">Cancel editing</button>
        <input type="hidden" id="amsAnnEditId" value="">
      </form>
      <div id="amsAnnouncementList"></div>
    </div>
  </main>

  <!-- ui.js gives the toast + confirm modal the board already used;
       dashboard.js drives the board exactly as on the old dashboard. -->
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/pwa.js" defer></script>
</body>
</html>
