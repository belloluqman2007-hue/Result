<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students Directory | Ameenullah School of Arabic and Islamic Studies</title>
  <!-- Legacy stylesheet (unchanged) + new modern layer -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modern-ui.css">

  <!-- NEW (PWA conversion): makes the site installable as a phone/desktop
       app with its own icon. Purely additive - no styling or behaviour
       of this page is changed. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f5021">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <!-- ======================================================
       NEW PAGE (ADDITIVE): read-only students directory with
       search, class/gender filters, pagination, profile view
       and Excel/CSV export. Data comes from the NEW GET
       /students endpoint. Nothing here writes to the DB.
  ====================================================== -->
  <div class="ams-shell">
    <div class="ams-scrim"></div>

    <aside class="ams-sidebar">
      <div class="ams-side-brand">
        <img src="images/LOGO.JPG" alt="School Logo">
        <div>
          <div class="ams-school-name">AMEENULLAH SCHOOL OF ARABIC AND ISLAMIC STUDIES</div>
          <div class="ams-school-sub">Result Management System</div>
        </div>
      </div>

      <nav class="ams-side-nav">
        <div class="ams-nav-label">Main</div>
        <a href="teacher-dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          Dashboard
        </a>
        <a href="add-student.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6"/><path d="M22 11h-6"/></svg>
          Add Student
        </a>
        <a href="students.html" class="ams-active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Students Directory
        </a>
        <a href="add-subject.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Classes &amp; Subjects
        </a>
        <div class="ams-nav-label">Tools</div>
        <a href="manage-signatures.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><path d="m16 8-9.04 9.07"/><path d="M17.5 15H9"/></svg>
          Manage Signatures
        </a>
        <a href="id-card.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="8.5" cy="12" r="2.5"/><path d="M13.5 10.5H18"/><path d="M13.5 14H18"/><path d="M5 15.5c.9-1 2.1-1.5 3.5-1.5s2.6.5 3.5 1.5"/></svg>
          Create ID Card
        </a>
        <a href="create-exam.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          Create Exam
        </a>
        <a href="student-result.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          Check Result
        </a>
      </nav>

      <div class="ams-side-footer">
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </aside>

    <main class="ams-main">
      <header class="ams-topbar">
        <button class="ams-icon-btn ams-hamburger" id="amsMenuToggle" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="ams-page-title">Students Directory</div>
        <div class="ams-topbar-right">
          <div class="ams-clock" id="amsClock"></div>
          <button class="ams-icon-btn" onclick="amsToggleTheme()" title="Toggle dark mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          </button>
        </div>
      </header>

      <div class="ams-page-pad">
        <div class="ams-greeting">
          <div>
            <h1>All Students</h1>
            <p>Search, filter and browse every registered student. <span id="amsTotalInfo"></span></p>
          </div>
          <a href="add-student.html"><button type="button">+ Add Student</button></a>
        </div>

        <!-- Toolbar: live search + filters + export -->
        <div class="ams-panel" style="margin-bottom:18px;">
          <div class="ams-table-toolbar" style="margin-bottom:0;">
            <div class="ams-search-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" id="amsDirSearch" placeholder="Search by name or student ID..." oninput="amsDirRefresh(1)">
            </div>
            <select id="amsDirClass" onchange="amsDirRefresh(1)" style="padding:11px 13px; font-family:'Cairo',sans-serif;">
              <option value="">All Classes</option>
            </select>
            <select id="amsDirGender" onchange="amsDirRefresh(1)" style="padding:11px 13px; font-family:'Cairo',sans-serif;">
              <option value="">All Genders</option>
              <option>Male</option>
              <option>Female</option>
            </select>
            <span class="ams-table-count" id="amsDirCount"></span>
            <button type="button" class="m-btn-ghost m-btn-sm" onclick="amsDirExport()" style="margin-left:auto;">⭳ Export to Excel (CSV)</button>
          </div>
        </div>

        <!-- Card grid (populated by js/students.js) -->
        <div class="ams-dir-grid" id="amsDirGrid"></div>
        <div class="ams-pagination" id="amsDirPager"></div>
      </div>
    </main>
  </div>

  <!-- Profile modal (opened when a student card is clicked) -->
  <div class="ams-modal-overlay" id="amsProfileOverlay" style="display:none;" onclick="if(event.target===this)amsProfileClose()">
    <div class="ams-modal" id="amsProfileBox"></div>
  </div>

  <script src="js/ui.js"></script>
  <script src="js/students.js"></script>

  <!-- NEW (PWA conversion): registers the service worker + install button. Additive only. -->
  <script src="js/pwa.js" defer></script>
</body>
</html>
