<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Signatures | Ameenullah School of Arabic and Islamic Studies</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- NEW: modern visual upgrade layer (loaded after legacy css) -->
  <link rel="stylesheet" href="css/modern-ui.css">
  <!-- NEW (signature settings redesign, request #4): management styles -->
  <link rel="stylesheet" href="css/manage.css">
  <style>
    /* Signature-specific bits (kept local to this page) */
    .signature-pad-wrap{
      border:1.5px solid var(--m-border,#D9E8E0);
      border-radius:12px;
      background:#fff;
      display:inline-block;
      touch-action:none;
      max-width:100%;
    }
    .signature-pad-wrap canvas{
      display:block;
      cursor:crosshair;
      max-width:100%;
      border-radius:12px;
    }
    .sig-tabs{ display:flex; gap:8px; margin-bottom:14px; }
    .sig-tab-btn{
      background:var(--m-surface-2,#F6FAF8);
      color:var(--m-emerald,#0F3D2E);
      border:1.5px solid var(--m-border,#D9E8E0);
      border-radius:999px;
      padding:8px 16px;
      font-size:12.5px;
      font-weight:800;
      cursor:pointer;
    }
    .sig-tab-btn.active{
      background:linear-gradient(140deg,var(--m-emerald-2,#1C5A42),var(--m-jade,#2F9E6E));
      color:#fff;
      border-color:transparent;
    }
    .sig-panel{ display:none; }
    .sig-panel.active{ display:block; }
    .sig-preview{
      width:100%;
      height:120px;
      object-fit:contain;
      border:1.5px dashed var(--m-border,#D9E8E0);
      border-radius:12px;
      /* checkerboard feel so transparent PNGs are easy to see */
      background:repeating-conic-gradient(#F2F8F5 0 25%, #FFFFFF 0 50%) 0 0/18px 18px;
      padding:8px;
      box-sizing:border-box;
    }
    .sig-cards{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(340px, 1fr));
      gap:24px;
    }
    @media (max-width:480px){
      .sig-cards{ grid-template-columns:1fr; }
    }
  </style>

  <!-- NEW (PWA conversion): makes the site installable as a phone/desktop
       app with its own icon. Purely additive - no styling or behaviour
       of this page is changed. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f5021">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body onload="checkAuth(); loadCurrentSignatures();">

  <!-- ==========================================================
       REDESIGNED (request #4): "Settings -> School Signatures".
       FOUR roles now: Principal, Vice Principal, Head Teacher and
       Class Teacher. Each card: live preview (transparent PNG),
       Draw or Upload, Replace, Remove. Cards are BUILT from the
       role list in js/signature.js - no duplicate markup.
       Saved signatures are automatically used on report cards
       (Principal + Class Teacher), unchanged behaviour.
  ========================================================== -->
  <div class="mng-page">

    <div class="mng-head">
      <a class="mng-back" href="teacher-dashboard.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Dashboard
      </a>
      <div class="mng-head-text">
        <h1>School Signatures</h1>
        <p>Upload or draw each official's signature once - the system stamps them on reports automatically. Transparent PNGs are supported.</p>
      </div>
    </div>

    <!-- Cards are generated here by js/signature.js -->
    <div class="sig-cards" id="sigCards"></div>

  </div>

  <!-- NEW: shared UI helpers (toasts, dark mode) - additive -->
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/signature.js"></script>

  <!-- NEW (PWA conversion): registers the service worker + install button. Additive only. -->
  <script src="js/pwa.js" defer></script>
</body>
</html>
