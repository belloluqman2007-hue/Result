<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat | Ameenullah School</title>
  <!-- NEW FILE (pack 24 - owner: "messaging is not available in admin and
       teachers space - add it and name it as chat in the side bar and
       organize everything well"): dedicated two-pane chat for ALL staff.
       Talks only to the pack-23 /api/messages routes; nothing existing
       is changed by adding this page. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f5021">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <style>
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Segoe UI', Arial, sans-serif; background:#eef3ef; color:#1f2d26; }
    .ch-top{
      background:linear-gradient(120deg,#14291c,#1d4a30 55%,#276b43); color:#fff;
      display:flex; align-items:center; gap:12px; padding:12px 16px;
      position:sticky; top:0; z-index:5; box-shadow:0 2px 10px rgba(0,0,0,.18);
    }
    .ch-top img{ width:34px; height:34px; border-radius:8px; background:#fff; }
    .ch-top b{ font-size:16px; }
    .ch-back{
      margin-left:auto; background:rgba(255,255,255,.14); color:#fff; border:none;
      padding:8px 14px; border-radius:10px; font-weight:700; cursor:pointer; text-decoration:none;
      font-size:13px;
    }
    .ch-shell{ display:flex; gap:14px; padding:14px; max-width:1100px; margin:0 auto; align-items:flex-start; }
    .ch-threads{ width:300px; flex:0 0 300px; background:#fff; border:1px solid #e1e9e3; border-radius:14px; overflow:hidden; }
    .ch-threads h3{ margin:0; padding:12px 14px; font-size:13px; color:#5B6B62; border-bottom:1px solid #eef1ee; letter-spacing:.3px; }
    .ch-thread{ display:block; width:100%; text-align:left; border:none; background:#fff; padding:12px 14px; cursor:pointer; border-bottom:1px solid #f2f5f2; font-family:inherit; }
    .ch-thread:hover{ background:#f4f9f5; }
    .ch-thread.on{ background:#e8f2ea; border-left:3px solid #1d4a30; }
    .ch-thread b{ display:block; font-size:13.5px; }
    .ch-thread span{ display:block; font-size:12px; color:#5B6B62; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ch-thread .ch-dot{ float:right; background:#C0392B; color:#fff; font-size:10px; font-weight:800; border-radius:10px; padding:1px 7px; }
    .ch-convo{ flex:1; background:#fff; border:1px solid #e1e9e3; border-radius:14px; display:flex; flex-direction:column; min-height:70vh; }
    .ch-convo-head{ padding:12px 16px; border-bottom:1px solid #eef1ee; font-weight:800; color:#14532d; }
    .ch-msgs{ flex:1; padding:14px 16px; overflow-y:auto; max-height:62vh; }
    .ch-bub{ max-width:78%; padding:8px 12px; border-radius:14px; margin:6px 0; font-size:14px; line-height:1.45; white-space:pre-wrap; }
    .ch-bub .ch-meta{ font-size:10.5px; opacity:.7; font-weight:700; margin-bottom:2px; }
    .ch-bub.parent{ background:#eef4ef; border:1px solid #d7e0da; border-bottom-left-radius:4px; margin-right:auto; }
    .ch-bub.staff{ background:#14532d; color:#fff; border-bottom-right-radius:4px; margin-left:auto; }
    .ch-compose{ display:flex; gap:8px; padding:12px 14px; border-top:1px solid #eef1ee; }
    .ch-compose input{ flex:1; padding:11px 12px; border:1px solid #d7e0da; border-radius:11px; font-size:14px; font-family:inherit; }
    .ch-compose button{ background:#14532d; color:#fff; border:none; border-radius:11px; padding:0 18px; font-weight:800; cursor:pointer; }
    .ch-empty{ color:#93a19a; text-align:center; margin-top:40px; font-size:14px; padding:0 20px; }
    .ch-note{ font-size:12px; color:#5B6B62; padding:0 16px 10px; }
    @media (max-width:820px){
      .ch-shell{ flex-direction:column; }
      .ch-threads{ width:100%; flex-basis:auto; }
      .ch-convo{ width:100%; }
    }
  </style>
</head>
<body>
  <header class="ch-top">
    <img src="images/LOGO.JPG" alt="Logo">
    <div><b>&#128172; Chat</b><div style="font-size:11px; opacity:.85;">Messages between parents and the school</div></div>
    <a class="ch-back" href="teacher-dashboard.html">&#8592; Dashboard</a>
  </header>

  <div class="ch-shell">
    <div class="ch-threads">
      <h3>PARENT CONVERSATIONS</h3>
      <div id="chThreadList"><div class="ch-empty">Loading...</div></div>
    </div>
    <div class="ch-convo">
      <div class="ch-convo-head" id="chConvoHead">Pick a conversation</div>
      <div class="ch-msgs" id="chMsgs"><div class="ch-empty">Select a parent on the left to read the conversation and reply.</div></div>
      <div class="ch-note" id="chNote">Replies go straight to the parent's portal (their bell lights up).</div>
      <div class="ch-compose">
        <input type="text" id="chBody" placeholder="Type your reply..." maxlength="2000" disabled>
        <button type="button" id="chSend" disabled>&#128231; Send</button>
      </div>
    </div>
  </div>

  <script src="js/chat.js"></script>
</body>
</html>
