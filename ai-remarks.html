<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat | Ameenullah School</title>
  <!-- CHANGED (pack 29 - owner: "I don't need the ai remark remove it and
       turn it to chat. Chatting with ai effectively and fluently, and make
       all the ai working"): this page used to be the one-note "AI Remarks"
       drafter. It is now a full, fluent CHAT with the school AI - ask it
       anything (remarks included), multi-turn like WhatsApp. If the AI is
       not switched on yet, an ADMIN gets a one-minute switch-on card right
       here (paste the free key once - saved inside the app - no Render
       dashboard) which wakes up EVERY AI feature at once. Teachers see a
       friendly "coming soon" note until the admin does it. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f5021">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <style>
    /* WhatsApp-style staff chat chrome - matches chat.html pack 27/28 look */
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0; font-family:'Segoe UI', Arial, sans-serif; color:#1f2d26;
      background:#dfe5dd;
      display:flex; flex-direction:column; height:100dvh;
    }
    /* ---------- top bar ---------- */
    .ai-top{
      background:linear-gradient(120deg,#14291c,#1d4a30 55%,#276b43); color:#fff;
      display:flex; align-items:center; gap:10px; padding:10px 12px;
      box-shadow:0 2px 10px rgba(0,0,0,.18); z-index:20; flex:0 0 auto;
    }
    .ai-back{
      color:#fff; text-decoration:none; font-size:20px; line-height:1;
      padding:6px 8px; border-radius:9px; background:rgba(255,255,255,.10); font-weight:700;
    }
    .ai-avatar{
      width:40px; height:40px; border-radius:50%; flex:0 0 40px;
      background:linear-gradient(135deg,#f3c94e,#d9a419);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
    }
    .ai-avatar svg{ width:23px; height:23px; }
    .ai-who{ min-width:0; }
    .ai-who b{ font-size:15.5px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ai-who small{ font-size:11.5px; opacity:.9; display:flex; align-items:center; gap:5px; }
    .ai-dot{ width:7px; height:7px; border-radius:50%; background:#6fe08f; display:inline-block; box-shadow:0 0 0 3px rgba(111,224,143,.22); }
    .ai-dot.off{ background:#d9d9d9; box-shadow:none; }
    .ai-top .sp{ flex:1; }
    .ai-iconbtn{
      border:none; background:rgba(255,255,255,.13); color:#fff; cursor:pointer;
      border-radius:10px; padding:8px 10px; font-size:14px; font-weight:800; line-height:1;
      display:flex; align-items:center; gap:6px;
    }
    .ai-iconbtn:hover{ background:rgba(255,255,255,.22); }

    /* ---------- chat area ---------- */
    .ai-log{
      flex:1 1 auto; overflow-y:auto; padding:16px 10px 8px;
      background:
        radial-gradient(circle at 12% 20%, rgba(20,83,45,.045) 0 26px, transparent 27px),
        radial-gradient(circle at 85% 65%, rgba(20,83,45,.05) 0 22px, transparent 23px),
        radial-gradient(circle at 55% 90%, rgba(217,164,25,.05) 0 28px, transparent 29px),
        #dfe5dd;
    }
    .ai-col{ max-width:820px; margin:0 auto; display:flex; flex-direction:column; gap:3px; }

    .ai-msg{ display:flex; margin:7px 0; gap:8px; align-items:flex-end; }
    .ai-msg .bot-ic{
      width:28px; height:28px; border-radius:50%; flex:0 0 28px;
      background:linear-gradient(135deg,#f3c94e,#d9a419); color:#231a02;
      display:flex; align-items:center; justify-content:center; font-size:15px;
      box-shadow:0 1px 3px rgba(0,0,0,.2);
      align-self:flex-start; margin-top:2px; /* sits by the sender's name-line, not floating under the bubble */
    }
    .ai-bub{
      max-width:82%; padding:8px 11px 6px; border-radius:12px; position:relative;
      box-shadow:0 1px 2px rgba(0,0,0,.13); font-size:14.5px; line-height:1.5;
      word-break:break-word;
    }
    .ai-msg.bot .ai-bub{ background:#ffffff; border-bottom-left-radius:4px; }
    .ai-msg.me{ justify-content:flex-end; }
    .ai-msg.me .ai-bub{ background:#d9fdd3; border-bottom-right-radius:4px; }
    .ai-body{ min-width:0; }
    .ai-meta{ float:right; margin:8px -3px -2px 10px; font-size:10.5px; color:#849687; display:inline-flex; align-items:center; gap:3px; height:12px; position:relative; bottom:-4px; }
    .ai-copy{
      display:inline-block; margin-top:5px; border:none; background:none; cursor:pointer;
      color:#8aa093; font-size:11px; font-weight:700; padding:2px 0;
    }
    .ai-copy:hover{ color:#14532d; }

    /* typing indicator */
    .ai-typing .ai-bub{ display:flex; gap:5px; padding:13px 14px; }
    .ai-typing .dt{ width:8px; height:8px; border-radius:50%; background:#9ab0a3; animation:aib 1.2s infinite; }
    .ai-typing .dt:nth-child(2){ animation-delay:.15s; } .ai-typing .dt:nth-child(3){ animation-delay:.3s; }
    @keyframes aib{ 0%,60%,100%{ transform:translateY(0); opacity:.5 } 30%{ transform:translateY(-5px); opacity:1 } }

    /* day chip + welcome */
    .ai-chipday{ align-self:center; background:#fdf3cd; color:#5d5316; font-size:11.5px; font-weight:700;
      padding:5px 12px; border-radius:9px; box-shadow:0 1px 2px rgba(0,0,0,.08); margin:6px auto 10px; }
    .ai-welcome{
      background:#fff; border:1px solid #e6ece8; border-radius:16px; padding:18px 16px; margin:6px 4px 10px;
      box-shadow:0 2px 10px rgba(20,41,28,.06); text-align:center;
    }
    .ai-welcome .big{
      width:58px; height:58px; margin:0 auto 10px; border-radius:18px;
      background:linear-gradient(135deg,#f3c94e,#d9a419);
      display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(217,164,25,.35);
    }
    .ai-welcome .big svg{ width:32px; height:32px; }
    .ai-welcome h2{ margin:0 0 4px; font-size:17px; color:#14532d; }
    .ai-welcome p{ margin:0 auto 12px; font-size:13px; color:#5B6B62; line-height:1.55; max-width:460px; }
    .ai-sugg{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
    .ai-sugg button{
      border:1.5px solid #cfe0c9; background:#f2f8f0; color:#1d4a30; border-radius:999px;
      padding:8px 13px; font-size:12.5px; font-weight:700; cursor:pointer; text-align:left;
    }
    .ai-sugg button:hover{ background:#e3f0dd; border-color:#9dc48e; }

    /* switch-on / coming-soon card */
    .ai-setup{ text-align:left; }
    .ai-setup h2{ display:flex; align-items:center; gap:8px; }
    .ai-steps{ margin:10px 0 0; padding:0; list-style:none; counter-reset:st; }
    .ai-steps li{
      counter-increment:st; position:relative; padding:7px 0 7px 40px; font-size:13px; color:#41564a; line-height:1.5;
    }
    .ai-steps li::before{
      content:counter(st); position:absolute; left:0; top:6px; width:26px; height:26px; border-radius:50%;
      background:#14532d; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;
    }
    .ai-steps a{ color:#0d6b4f; font-weight:800; }
    .ai-keyrow{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
    .ai-keyrow input{
      flex:1 1 220px; padding:11px 13px; border:1.5px solid #d7e0da; border-radius:10px; font-size:14px; font-family:inherit;
    }
    .ai-keyrow button{
      border:none; border-radius:10px; padding:11px 18px; font-weight:800; font-size:14px; cursor:pointer;
      background:linear-gradient(135deg,#14532d,#0f6a44); color:#fff; box-shadow:0 3px 9px rgba(20,83,45,.3);
    }
    .ai-keyrow button:disabled{ opacity:.55; cursor:default; }
    .ai-keynote{ font-size:12.5px; margin-top:9px; color:#5B6B62; min-height:16px; }
    .ai-keynote.err{ color:#C0392B; font-weight:700; }
    .ai-keynote.ok{ color:#0e7a40; font-weight:800; }
    .ai-connected{
      display:flex; align-items:center; gap:10px; background:#eaf7ec; border:1px solid #cbe8cf;
      border-radius:12px; padding:11px 13px; margin-top:14px; font-size:13px; color:#1d4a30; font-weight:700;
    }
    .ai-connected .k{ color:#5B6B62; font-weight:600; }
    .ai-connected button{
      margin-left:auto; border:1px solid #c7d8c9; background:#fff; color:#8a4b12; border-radius:9px;
      padding:6px 10px; font-size:12px; font-weight:800; cursor:pointer;
    }
    .ai-fine{ font-size:11.5px; color:#93a19a; margin-top:10px; line-height:1.5; }

    /* ---------- composer ---------- */
    .ai-compose{
      flex:0 0 auto; background:#e9efe9; padding:9px 10px calc(9px + env(safe-area-inset-bottom));
      box-shadow:0 -2px 10px rgba(0,0,0,.06);
    }
    .ai-composerow{ max-width:820px; margin:0 auto; display:flex; gap:8px; align-items:flex-end; }
    .ai-input{
      flex:1; border:none; resize:none; outline:none; border-radius:22px; padding:11px 15px;
      font-size:14.5px; font-family:inherit; line-height:1.4; max-height:132px; background:#fff;
      box-shadow:0 1px 3px rgba(0,0,0,.10);
    }
    .ai-send{
      width:46px; height:46px; border:none; border-radius:50%; cursor:pointer; flex:0 0 46px;
      background:linear-gradient(135deg,#1d6a3a,#0f6a44); color:#fff;
      display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(20,83,45,.35);
    }
    .ai-send:disabled{ opacity:.45; cursor:default; }
    .ai-send svg{ width:21px; height:21px; margin-left:-2px; }

    @media (max-width:520px){
      .ai-bub{ max-width:88%; }
      .ai-who b{ font-size:14px; }
    }
  </style>
</head>
<body>
  <header class="ai-top">
    <a class="ai-back" href="teacher-dashboard.html" title="Back to dashboard">&#8592;</a>
    <span class="ai-avatar">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2l1.9 6.1L20 10l-6.1 1.9L12 18l-1.9-6.1L4 10l6.1-1.9L12 2z" fill="#231a02"/><path d="M19 15l.9 2.6 2.6.9-2.6.9L19 22l-.9-2.6-2.6-.9 2.6-.9L19 15z" fill="#231a02" opacity=".75"/></svg>
    </span>
    <div class="ai-who">
      <b>School AI</b>
      <small><span class="ai-dot off" id="aiDot"></span><span id="aiState">checking&hellip;</span></small>
    </div>
    <span class="sp"></span>
    <button class="ai-iconbtn" id="aiNewBtn" type="button" title="Start a new chat">&#9998; New</button>
  </header>

  <main class="ai-log" id="aiLog">
    <div class="ai-col" id="aiCol">
      <div class="ai-chipday">Today</div>
      <!-- welcome / setup card is injected by js/ai-remarks.js -->
      <div id="aiLanding"></div>
    </div>
  </main>

  <footer class="ai-compose">
    <div class="ai-composerow">
      <textarea class="ai-input" id="aiInput" rows="1" placeholder="Message the school AI&hellip;" aria-label="Message the school AI"></textarea>
      <button class="ai-send" id="aiSend" type="button" title="Send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.4 20.4l17.4-7.5c.81-.35.81-1.46 0-1.81L3.4 3.6c-.66-.29-1.39.2-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.89c-.5.06-.87.49-.87.99l.01 4.6c0 .72.73 1.2 1.39.92z"/></svg>
      </button>
    </div>
  </footer>

  <script src="js/ui.js"></script>
  <script src="js/ai-remarks.js"></script>
</body>
</html>
