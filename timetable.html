<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetables | Ameenullah School</title>
  <!-- NEW FILE (pack 25 - owner: "Add exam and class timetable for admin
       and teachers, and it will display for students after been
       published"): staff builder for BOTH timetables with an admin-only
       Publish gate per class. Talks only to /api/timetable/*. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f5021">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <style>
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Segoe UI', Arial, sans-serif; background:#eef3ef; color:#1f2d26; }
    .tt-top{ background:linear-gradient(120deg,#14291c,#1d4a30 55%,#276b43); color:#fff; display:flex; align-items:center; gap:12px; padding:12px 16px; position:sticky; top:0; z-index:5; }
    .tt-top img{ width:34px; height:34px; border-radius:8px; background:#fff; }
    .tt-back{ margin-left:auto; background:rgba(255,255,255,.14); color:#fff; border:none; padding:8px 14px; border-radius:10px; font-weight:700; text-decoration:none; font-size:13px; }
    .tt-wrap{ max-width:820px; margin:0 auto; padding:16px 14px 50px; }
    .tt-tabs{ display:flex; gap:8px; margin-bottom:14px; }
    .tt-tab{ flex:1; padding:11px; border-radius:12px; border:1px solid #d7e0da; background:#fff; font-weight:800; font-size:14px; color:#1d4a30; cursor:pointer; }
    .tt-tab.on{ background:#14532d; color:#fff; border-color:#14532d; }
    .tt-card{ background:#fff; border:1px solid #e1e9e3; border-radius:16px; padding:16px; margin-bottom:14px; }
    .tt-row{ display:flex; flex-wrap:wrap; gap:8px; align-items:end; }
    .tt-row label{ display:flex; flex-direction:column; font-size:11.5px; font-weight:700; color:#5B6B62; gap:3px; }
    .tt-row input, .tt-row select{ padding:9px 10px; border:1px solid #d7e0da; border-radius:10px; font-size:13.5px; font-family:inherit; min-width:0; }
    .tt-btn{ background:#14532d; color:#fff; border:none; border-radius:10px; padding:10px 16px; font-weight:800; cursor:pointer; }
    .tt-btn.light{ background:#fff; color:#1d4a30; border:1px solid #c9d5cc; }
    .tt-btn.gold{ background:#B98A1D; }
    table{ width:100%; border-collapse:collapse; margin-top:10px; }
    th, td{ text-align:left; font-size:13px; padding:8px 8px; border-bottom:1px solid #eef1ee; }
    th{ font-size:11.5px; color:#5B6B62; letter-spacing:.2px; }
    .tt-pub{ display:inline-block; font-size:11px; font-weight:800; border-radius:8px; padding:2px 8px; }
    .tt-pub.yes{ background:#e4f4ea; color:#14532d; }
    .tt-pub.no{ background:#fdf0e4; color:#B98A1D; }
    .tt-del{ background:none; border:none; color:#C0392B; font-weight:800; cursor:pointer; }
    .tt-note{ font-size:13px; min-height:18px; margin-top:8px; }
    .tt-publishbar{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    @media (max-width:640px){ .tt-row label{ width:47%; } .tt-row label.grow{ width:100%; } }
  </style>
</head>
<body>
  <header class="tt-top">
    <img src="images/LOGO.JPG" alt="Logo">
    <div><b>&#128467;&#65039; Timetables</b><div style="font-size:11px; opacity:.85;">Build &amp; publish for students</div></div>
    <a class="tt-back" href="teacher-dashboard.html">&#8592; Dashboard</a>
  </header>

  <div class="tt-wrap">
    <div class="tt-tabs">
      <button class="tt-tab on" id="ttTabExam" type="button">&#128394; Exam Timetable</button>
      <button class="tt-tab" id="ttTabClass" type="button">&#128218; Class Timetable</button>
    </div>

    <div class="tt-card">
      <label style="font-size:12px; font-weight:700; color:#5B6B62;">Class
        <select id="ttClass" style="padding:9px 10px; border:1px solid #d7e0da; border-radius:10px; min-width:220px; margin-top:4px;"></select>
      </label>
    </div>

    <!-- EXAM TIMETABLE -->
    <div class="tt-card" id="ttExamPane">
      <h3 style="margin:0 0 8px; color:#14532d;">Add exam entry</h3>
      <div class="tt-row">
        <label class="grow">Subject <input type="text" id="ttExSubject" placeholder="e.g. القرآن الكريم"></label>
        <label>Date <input type="date" id="ttExDate"></label>
        <label>From <input type="time" id="ttExStart"></label>
        <label>To <input type="time" id="ttExEnd"></label>
        <button class="tt-btn" id="ttExAdd" type="button">&#10133; Add</button>
      </div>
      <div id="ttExList"></div>
      <div class="tt-publishbar" style="margin-top:12px;">
        <span id="ttExState"></span>
        <button class="tt-btn gold" id="ttExPublish" type="button" style="display:none;">&#128227; Publish to students</button>
        <button class="tt-btn light" id="ttExUnpublish" type="button" style="display:none;">Hide from students</button>
      </div>
    </div>

    <!-- CLASS TIMETABLE -->
    <div class="tt-card" id="ttClassPane" style="display:none;">
      <h3 style="margin:0 0 8px; color:#14532d;">Add period</h3>
      <div class="tt-row">
        <label>Day
          <select id="ttClDay">
            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
            <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
          </select>
        </label>
        <label>Period # <input type="number" id="ttClPeriod" min="1" max="12" value="1"></label>
        <label class="grow">Subject <input type="text" id="ttClSubject" placeholder="e.g. الفقه"></label>
        <label>From <input type="time" id="ttClStart"></label>
        <label>To <input type="time" id="ttClEnd"></label>
        <button class="tt-btn" id="ttClAdd" type="button">&#10133; Add</button>
      </div>
      <div id="ttClList"></div>
      <div class="tt-publishbar" style="margin-top:12px;">
        <span id="ttClState"></span>
        <button class="tt-btn gold" id="ttClPublish" type="button" style="display:none;">&#128227; Publish to students</button>
        <button class="tt-btn light" id="ttClUnpublish" type="button" style="display:none;">Hide from students</button>
      </div>
    </div>

    <div class="tt-note" id="ttNote"></div>
  </div>

  <script src="js/timetable.js"></script>
</body>
</html>
