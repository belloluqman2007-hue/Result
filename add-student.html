<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Student | Ameenullah School of Arabic and Islamic Studies</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- NEW: modern visual upgrade layer (loaded after legacy css) -->
  <link rel="stylesheet" href="css/modern-ui.css">
</head>
<body onload="checkAuth(); loadClassesIntoSelects();">
  <div class="search-container">
    <a href="teacher-dashboard.html">&larr; Back to Dashboard</a>
    <h2>Add Student</h2>

    <input type="text" id="studentId" placeholder="Student ID">
    <input type="text" id="fullName" placeholder="Full Name">
    <select id="gender">
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>


    <select id="className">
      <option value="" disabled selected>Select Class</option>
    </select>
    <input type="DATE" id="dateOfBirth">

    <label for="photo">Student Photo (optional)</label>
    <input type="file" id="photo" accept="image/png, image/jpeg">

    <button onclick="saveStudent()">Save Student</button>
  </div>

  <div class="search-container">
    <h3>Bulk Add Students</h3>
    <p style="margin-bottom:14px; font-size:14px; color:#555;">
      Add many students at once instead of one by one. Download the template,
      fill it in with your students, then upload it here.
    </p>

    <a id="downloadTemplateLink" href="/download-student-template" style="display:inline-block; margin-bottom:14px;">
      &#8681; Download Student Template (.xlsx)
    </a>

    <div>
      <input type="file" id="bulkFile" accept=".xlsx,.xls,.csv">
      <button onclick="uploadBulkStudents()">Upload File</button>
    </div>

    <div id="bulkResults" style="margin-top:16px; display:none;">
      <p id="bulkSummary" style="font-weight:600; margin-bottom:8px;"></p>
      <ul id="bulkErrorList" style="font-size:13px; color:#8C3B2E; padding-left:20px;"></ul>
    </div>
  </div>

  <!-- NEW: shared UI helpers (toasts, dark mode, export) - additive -->
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/subject.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
