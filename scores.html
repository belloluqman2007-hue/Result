<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Scores | Ameenullah School</title>
  <!-- NEW FILE (pack 26 - owner: "move student score, load student ... to
       the sidebar"): the RESULT ENTRY MODULE moved here from the
       dashboard, BYTE-EQUIVALENT: same ids, same oninput/onblur/onchange
       handlers, same buttons, same scripts (ui.js / app.js / subject.js /
       dashboard.js). No result logic, calculation or query changed. -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modern-ui.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f5021">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    /* Staff page chrome - identical pattern to chat.html / notices.html */
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Segoe UI', Arial, sans-serif; background:#eef3ef; color:#1f2d26; }
    .sc-top{
      background:linear-gradient(120deg,#14291c,#1d4a30 55%,#276b43); color:#fff;
      display:flex; align-items:center; gap:12px; padding:12px 16px;
      position:sticky; top:0; z-index:20; box-shadow:0 2px 10px rgba(0,0,0,.18);
    }
    .sc-top img{ width:34px; height:34px; border-radius:8px; background:#fff; }
    .sc-top b{ font-size:16px; }
    .sc-top small{ display:block; font-size:11px; opacity:.85; }
    .sc-back{
      margin-left:auto; background:rgba(255,255,255,.14); color:#fff; border:none;
      padding:8px 14px; border-radius:10px; font-weight:700; cursor:pointer; text-decoration:none;
      font-size:13px;
    }
    .sc-wrap{ max-width:980px; margin:0 auto; padding:16px 14px 60px; }
    /* keep the moved module's own design; only page padding is new */
    .sc-wrap .score-card{ margin-top:14px; }
  </style>
</head>
<!-- Same onload wiring the dashboard used for this module: fills the
     Class dropdown, refreshes subjects, verifies login. -->
<body onload="loadClassesIntoSelects(); loadSubjects(); checkAuth();">
  <header class="sc-top">
    <img src="images/LOGO.JPG" alt="Logo">
    <div><b>&#128221; Student Scores</b><small>Enter &amp; manage scores - moved from the dashboard</small></div>
    <a class="sc-back" href="teacher-dashboard.html">&larr; Dashboard</a>
  </header>

  <main class="sc-wrap">
    <!-- ======================================================
         EXISTING RESULT ENTRY MODULE - moved from the dashboard
         in pack 26, unchanged: same ids, same handlers.
    ====================================================== -->
    <div class="score-card" id="score-entry">
      <h2>📝 Enter Student Score</h2>

      <div class="section-title">Student Information</div>

      <form id="scoreForm">

        <div class="form-group">
          <label>Student ID</label>
          <input type="text" id="studentId" onblur="loadStudent()" required>
          <div id="studentQuickCard" class="ams-quick-card" style="display:none;"></div>
        </div>

        <div class="form-group">
          <label>Student Name</label>
          <input type="text" id="studentName" required>
        </div>

        <div class="form-group">
          <label>Class</label>
          <select id="studentClass" required onchange="loadSubjects()">
            <option value="" disabled selected>Select Class</option>
          </select>
        </div>

        <div class="form-group">
          <label>Session</label>
          <select id="session" required>
            <option value="" disabled selected>Select Session</option>
            <option>2025/2026</option>
            <option>2026/2027</option>
            <option>2027/2028</option>
            <option>2028/2029</option>
            <option>2029/2030</option>
          </select>
        </div>

        <div class="form-group">
          <label>Term</label>
          <select id="term" required>
            <option value="" disabled selected>Select Term</option>
            <option>1st Term</option>
            <option>2nd Term</option>
            <option>3rd Term</option>
          </select>
        </div>

        <div class="form-group">
          <label>Subject</label>
          <select id="subject" required>
            <option value="" disabled selected>Select Subject</option>
          </select>
        </div>

        <div class="section-title">Assessment Scores</div>

        <div class="form-group">
          <label>First Test</label>
          <input type="number" id="firstTest" oninput="calculateScore()">
        </div>

        <div class="form-group">
          <label>Second Test</label>
          <input type="number" id="secondTest" oninput="calculateScore()">
        </div>

        <div class="form-group">
          <label>Note</label>
          <input type="number" id="noteScore" oninput="calculateScore()">
        </div>

        <div class="form-group">
          <label>Attendance</label>
          <input type="number" id="attendanceScore" oninput="calculateScore()">
        </div>

        <div class="form-group">
          <label>Exam</label>
          <input type="number" id="examScore" oninput="calculateScore()">
        </div>

        <div class="section-title">Result</div>

        <div class="form-group">
          <label>CA Score</label>
          <input type="number" id="caScore" readonly>
        </div>

        <div class="form-group">
          <label>Total Score</label>
          <input type="number" id="totalScore" readonly>
        </div>

        <div class="form-group">
          <label>Grade</label>
          <input type="text" id="grade" readonly>
        </div>

        <button type="button" id="saveScoreBtn" onclick="saveScore()">Save Score</button>

        <button type="button" id="cancelEditBtn" onclick="cancelEdit()" style="display:none; background:#888; margin-left:10px;">Cancel Edit</button>
      </form>
    </div>

    <!-- EXISTING: Student Scores loader (same ids / handlers) -->
    <div class="ams-section-head" style="margin-top:26px;">
      <h2>Student Scores</h2>
    </div>

    <div class="card-section" style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
      <input type="text" id="loadStudentId" placeholder="Enter Student ID to load their results">
      <button type="button" onclick="loadExistingResults()">Load Results</button>
      <button type="button" onclick="deleteAllResultsForStudent()" style="background:#8C3B2E; border-color:#8C3B2E; color:#fdf3ef;">Delete All Results for this Student</button>
    </div>

    <!-- table toolbar (filter + export) - reads scoreTable only -->
    <div class="ams-table-toolbar" style="margin:0 20px;">
      <div class="ams-search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="amsScoreFilter" placeholder="Filter loaded scores (name, subject, term, grade...)" oninput="amsFilterScoreTable()">
      </div>
      <span class="ams-table-count" id="amsScoreCount"></span>
      <button type="button" class="m-btn-ghost m-btn-sm" onclick="amsExportTableCSV(document.getElementById('scoreTable'), 'student-scores.csv')" style="margin-left:auto;">
        ⭳ Export to Excel (CSV)
      </button>
    </div>

    <!-- EXISTING: results table - same id + same 15 columns -->
    <div class="ams-table-scroll" style="margin:0 20px 40px;">
      <table id="scoreTable">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Class</th>
          <th>Term</th>
          <th>Subject</th>
          <th>First Test</th>
          <th>Second Test</th>
          <th>Note</th>
          <th>Attendance</th>
          <th>CA</th>
          <th>Exam</th>
          <th>Total</th>
          <th>Grade</th>
          <th>Edit</th>
          <th>Action</th>
        </tr>
      </table>
    </div>
  </main>

  <!-- Same scripts, same order as the dashboard had them. -->
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/subject.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/pwa.js" defer></script>
</body>
</html>
